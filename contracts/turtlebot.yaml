name: turtlebot_diff_drive
version: 1

# Robot type for LeRobot dataset metadata
robot_type: diff_drive

# Recording parameters
rate_hz: 20.0
max_duration_s: 15.0

observations:
  - key: observation.images.cam
    topic: /camera/image_raw
    type: sensor_msgs/msg/Image
    image:
      # bag_to_lerobot decodes to RGB and resizes here
      resize: [224, 224]
    resample: drop
    align: {strategy: asof, tol_ms: 50, stamp: header}
    qos: {reliability: best_effort, history: keep_last, depth: 5}

  - key: observation.state
    topic: /joint_states
    type: sensor_msgs/msg/JointState
    selector:
      # Only the wheel joints matter for diff_drive control
      names: [position.wheel_left_joint, position.wheel_right_joint, velocity.wheel_left_joint, velocity.wheel_right_joint]
    resample: hold
    align: {strategy: hold, stamp: header}
    qos: {reliability: reliable, history: keep_last, depth: 50}

# no tasks section; bag_to_lerobot uses metadata.yaml custom_data.lerobot.operator_prompt

actions:
  - key: action
    publish:
      topic: /cmd_vel
      type: geometry_msgs/msg/Twist
      layout: flat
      qos: {reliability: reliable, history: keep_last, depth: 10}
    selector:
      # For diff_drive, only linear.x (forward/back) and angular.z (rotation) matter
      names: [linear.x, angular.z]
      field: data
    from_tensor:
      # Clamp linear.x and angular.z to reasonable diff_drive range
      clamp: [-1.0, 1.0]

recording:
  storage: mcap